---
# Namespace for all medical app resources
apiVersion: v1
kind: Namespace
metadata:
  name: medical-app

---
# Secret: DB + JWT credentials
# Create this manually on the cluster (never commit real values):
#
#   kubectl create secret generic medical-app-secrets \
#     --namespace=medical-app \
#     --from-literal=DB_HOST=<rds-endpoint> \
#     --from-literal=DB_PORT=3306 \
#     --from-literal=DB_USERNAME=admin \
#     --from-literal=DB_PASSWORD=<your-db-password> \
#     --from-literal=DB_DATABASE=medical \
#     --from-literal=JWT_SECRET=<strong-random-secret> \
#     --from-literal=JWT_REFRESH_SECRET=<another-strong-secret>
#
# This YAML is a reference template only.
apiVersion: v1
kind: Secret
metadata:
  name: medical-app-secrets
  namespace: medical-app
type: Opaque
stringData:
  DB_HOST: "REPLACE_WITH_RDS_ENDPOINT"
  DB_PORT: "3306"
  DB_USERNAME: "admin"
  DB_PASSWORD: "REPLACE_WITH_DB_PASSWORD"
  DB_DATABASE: "medical"
  JWT_SECRET: "REPLACE_WITH_JWT_SECRET"
  JWT_EXPIRES_IN: "7d"
  JWT_REFRESH_SECRET: "REPLACE_WITH_JWT_REFRESH_SECRET"
  JWT_REFRESH_EXPIRES_IN: "30d"
